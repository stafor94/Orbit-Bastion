<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#090b12">
    <title>Orbit Bastion</title>
    <script>
      window.__assetVersion = new URLSearchParams(window.location.search).get("v") || "2026-06-content-sync";
      document.write(`<link rel="stylesheet" href="styles/main.css?v=${window.__assetVersion}">`);
    </script>
  </head>
  <body>
    <main id="app" class="app">
      <section class="topbar" aria-label="전투 상태">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>Orbit Bastion</h1>
            <button id="stageInfoButton" class="stage-trigger" type="button">
              <span id="stageName">착륙 방어선</span>
            </button>
          </div>
        </div>
        <div class="status-grid">
          <div class="status-pill">
            <span>난이도</span>
            <strong id="difficultyValue">쉬움</strong>
          </div>
          <div class="status-pill">
            <span>코어</span>
            <strong id="coreValue">20</strong>
            <small id="coreShieldValue" class="status-subvalue hidden">쉴드 0/0</small>
          </div>
          <div class="status-pill">
            <span>합금</span>
            <strong id="alloyValue">160</strong>
          </div>
          <div class="status-pill">
            <span>웨이브</span>
            <strong id="waveValue">1/10</strong>
          </div>
        </div>
        <button id="soundButton" class="sound-toggle" type="button" aria-label="소리 켜짐" title="소리 켜짐"></button>
        <div id="bossHud" class="boss-hud" aria-live="polite">
          <div class="boss-hud-top">
            <strong id="bossName">브루드 콜로서스</strong>
            <span id="bossPhase">접근 중</span>
          </div>
          <div class="boss-bar"><span id="bossBarFill"></span></div>
          <div id="bossTelemetry" class="boss-telemetry">보스 출현 전</div>
        </div>
      </section>

      <section class="battle-shell" aria-label="전장">
        <canvas id="gameCanvas" role="img" aria-label="타워와 적 이동 경로가 표시되는 전장 캔버스"></canvas>
        <canvas id="fxCanvas" aria-hidden="true"></canvas>
        <div id="floatingTextLayer" class="floating-text-layer"></div>
        <div id="bossWarning" class="boss-warning" role="alert" aria-live="assertive">
          <strong id="bossWarningTitle">거대 생체 신호 접근</strong>
          <span id="bossWarningDetail">보스 출현에 대비해 화력을 정비하세요.</span>
        </div>
        <div id="banner" class="banner hidden" role="status" aria-live="polite">
          <strong>식민지 방어망 가동</strong>
          <span>배치 슬롯을 선택한 뒤 구매할 타워를 고르세요.</span>
        </div>
      </section>

      <section class="command-panel" aria-label="타워 명령">
        <div class="battle-intel" aria-label="웨이브 정보">
          <div class="intel-card">
            <span>다음 웨이브</span>
            <strong id="waveSummary">대기 중</strong>
            <div id="waveGroups" class="intel-tags"></div>
          </div>
          <div class="intel-card">
            <span>실시간 위협</span>
            <strong id="threatSummary">적 정보 없음</strong>
            <div id="threatTags" class="intel-tags"></div>
          </div>
        </div>
        <div id="selectedCard" class="selected-card" aria-live="polite">
          <div>
            <span id="selectedLabel" class="label">선택 없음</span>
            <strong id="selectedName">타워 또는 슬롯을 선택하세요</strong>
            <span id="selectedStats" class="selected-stats"></span>
            <div id="selectedDetails" class="selected-details"></div>
          </div>
          <div class="selected-actions">
            <button id="upgradeButton" type="button" disabled>강화</button>
            <button id="sellButton" type="button" disabled>판매</button>
          </div>
        </div>

        <div id="towerBar" class="tower-bar"></div>

        <div class="footer-actions">
          <button id="startWaveButton" type="button" class="primary">웨이브 시작</button>
          <button id="speedButton" type="button">1x</button>
          <button id="autoWaveButton" type="button">수동</button>
          <button id="resetButton" type="button">재시작</button>
          <button id="baseButton" type="button">기지</button>
        </div>
        <div class="tactical-panel" aria-label="긴급 전술 스킬">
          <button id="stasisSkillButton" type="button">정지장</button>
          <button id="overchargeSkillButton" type="button">과충전</button>
          <button id="empSkillButton" type="button">EMP</button>
          <span id="tacticalUsesValue" class="tactical-uses">전술 6/6</span>
        </div>
      </section>

      <section id="screenOverlay" class="screen-overlay" aria-label="기지 화면"></section>
      <div id="a11yStatus" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
    </main>

    <script>
      const assetVersion = window.__assetVersion || String(Date.now());
      [
        "src/data/difficulties.js",
        "src/data/gameData.js",
        "src/data/researchPresentation.js",
        "src/data/towerExpansion.js",
        "src/data/slotLayouts.js",
        "src/ui/baseScreen.js",
        "src/ui/newGameDialog.js",
        "src/game/waveLogic.js",
        "src/game/targeting.js",
        "src/game/researchLogic.js",
        "src/render/effectsLayer.js",
        "src/render/battleEffectsRenderer.js",
        "src/render/enemyRenderer.js",
        "src/render/towerRenderer.js",
        "src/input/battleInput.js",
        "src/ui/battleHud.js",
        "src/ui/battleOverlays.js",
        "src/render/mapRenderer.js",
        "src/game/towerMetrics.js",
        "src/main.js",
      ].forEach((src) => {
        document.write(`<script src="${src}?v=${assetVersion}"><\/script>`);
      });
    </script>
  </body>
</html>
